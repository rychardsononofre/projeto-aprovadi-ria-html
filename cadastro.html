<!DOCTYPE html>

<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title> Aprova Diária</title>
</head>

<body>
    <h1>Cadastro do Servidor</h1>
    <h2>Formulário de Cadastro</h2>

    <form>
        <p>
        <fieldset>
            <label for="cadastro_nome"> Nome Completo:</label>
            <input id="cadastro_nome" type="text">
            </p>
            <p>
                <label for="cadastro_cpf">CPF:</label>
                <input id="cadastro_cpf" name="cpf" type="text" inputmode="numeric" placeholder="000.000.000-00">
            </p>
            <p>
                <label for="cadastro_númerofuncional"> Número Funcional:</label>
                <input id="cadastro_númerofuncional" type="text">
            </p>
            <p>
                <label for="cadastro_cargo"> Cargo:</label>
                <input id="cadastro_cargo" type="text">
            </p>
            <p>
                <label for="cadastro_setor"> Setor:</label>
                <input id="cadastro_setor" type="text">
            </p>
            <p>
                <label for="cadastro_órgão"> Órgão:</label>
                <input id="cadastro_órgão" type="text">
        </fieldset>
        </p>
        <p>
        <fieldset>
            <label for="cadastro_banco"> Banco:</label>
            <input id="cadastro_banco" type="text">
            </p>
            <label for="tipo_de_conta"> Tipo de Conta:
                <select>
                    <option value="">Corrente</option>
                    <option value="">Poupança</option>
                    </p>

                    <p>
                        <label for="cadastro_agencia">Número da Agência:</label>
                        <input id="cadastro_agencia" name="agencia" type="text" inputmode="numeric"
                            placeholder="0000-0">
                    </p>
                    <p>
                        <label for="cadastro_numero_daconta">Número da Conta:</label>
                        <input id="cadastro_numero_daconta" name="numero_conta" type="text" inputmode="numeric"
                            placeholder="0000-0">
                    </p>

                    </fildest>

        </fieldset>
        <p>
        <fieldset>
            <label for="cadastro_senha">Senha:</label>
            <input id="cadastro_senha" type="password">
            </p>
            <p>
                <label for="cadastro_senha_confirm">Confirme a senha:</label>
                <input id="cadastro_senha_confirm" type="password">
            </p>
            <p>
                <button type="reset">Limpar</button>
                <button type="submit">Cadastrar</button>
            </p>
            </fidest>
    </form>
</body>

</html>
