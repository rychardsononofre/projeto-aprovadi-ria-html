<!DOCTYPE html>

<html lang= "pt-br">
    <head>
        <meta charset="UTF-8">
        <title> Aprova Diária</title>
    </head>

    <body>
        <h1>Cadastro do Servidor</h1>
        <h2>Formulário de Cadastro</h2>

        <form>
            <p>
                <label for="cadastro_nome"> Nome Completo:</label> 
                <input id="cadastro_nome" type="text">
            </p>
            <p>
                <label for="cadastro_cpf"> CPF:</label></label>
                <input id="cadastro_cpf" type="text">
            </p>
            <p>
                <label for="cadastro_númerofuncional"> Número Funcional:</label>
                <input id="cadastro_númerofuncional" type="text">
            </p>
            <p>
                <label for="cadastro_setor"> Setor:</label>
                <input id="cadastro_setor" type="text">
            </p>
            <p>
                <label for="cadastro_órgão"> Órgão:</label>
                <input id="cadastro_órgão" type="text">
            </p>
            <p>
                <label for="cadastro_banco"> Banco:</label>
                <input id="cadastro_banco" type="text">
            </p> 
            <p>
                <label for="cadastro_tipo_debanco"> Conta Corrente ou Poupança:</label>
                <input id="cadastro_tipo_debanco" type="text">
            </p>
            <p>
                <label for="cadastro_número_daconta"> Número da Conta:</label>
                <input id="cadastro_número_daconta" type="text">
             </p>
            <p>
                <label for="cadastro_número_da_agência"> Número da Agência:</label>
                <input id="cadastro_número_da_agência" type="text">    
                </p>
        <p>
            <label for="cadastro_senha">Senha:</label>
            <input id="cadastro_senha" type="password">
        </p>
        <p>
            <label for="cadastro_senha_confirm">Confirme a senha:</label>
            <input id="cadastro_senha_confirm" type="password">
        </p>
        <p>
            <button type="reset">Limpar</button>
            <button type="submit">Cadastrar</button>
        </p>
        </form>

        <h2> Usuários Cadastrados</h2>
        <table>
            <tr>
                <th>Nome</th>
                <th>CPF</th>
                <th>Número Funcional</th>
                <th>Setor</th>
            </tr>
            <tr>
                <td>Rychardson</td>
                <td>000000</td>
                <td>141328</td>
                <td>GFS</td>
            </tr>
        </table>
    </body>
</html>
