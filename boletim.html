<!DOCTYPE html>

<html lang= "pt-br">
    <head>
        <meta charset="UTF-8">
        <title> Aprova Diária</title>
    </head>

    <body>
        <h1>Boletim de Diária</h1>
        <h2>Dados do Solicitante</h2>
        <form>
            <p>
                <label for="nome"> Nome:</label> 
                <input id="nome" type="text">
            </p>
            <form>
            <p>
                <label for="número_funcional"> Número Funcional:</label> 
                <input id="número_funcional" type="text">
            </p>
            <p>
                <label for="cargo"> Cargo:</label> 
                <input id="cargo" type="text">
            </p>
            <p>
                <label for="setor_e_órgão"> Setor/Órgão:</label> 
                <input id="setor_e_órgão" type="text">
            </p>
            <p>
                <label for="mês_e_ano"> Mês/Ano:</label> 
                <input id="mês_e_ano" type="text">
            </p>
        <h2>Dados de Partida</h2>
        <form>
            <p>
                <label for="dia_do_mês"> Dia do Mês:</label> 
                <input id="dia_do_mês" type="text">
            </p>
            <form>
            <p>
                <label for="horário_origem"> Hora (Origem):</label> 
                <input id="horário_origem" type="text">
            </p>
             <p>
                <label for="local_origem"> Local (Origem):</label> 
                <input id="local_origem" type="text">
            </p>
           
             <p>
                <label for="horário_destino"> Hora (Destino):</label> 
                <input id="horário_destino" type="text">
            </p>
            <p>
                <label for="horário_destino"> Local(Destino):</label> 
                <input id="horário_destino" type="text">
            </p>
            <h2>Dados de Chegada</h2>
        <form>
            <p>
                <label for="dia_do_mês"> Dia do Mês:</label> 
                <input id="dia_do_mês" type="text">
            </p>
            <form>
            <p>
                <label for="horário_origem"> Hora (Destino):</label> 
                <input id="horário_origem" type="text">
            </p>
             <p>
                <label for="local_origem"> Local (Destino):</label> 
                <input id="local_origem" type="text">
            </p>
           
             <p>
                <label for="horário_destino"> Hora (Origem):</label> 
                <input id="horário_destino" type="text">
            </p>
            <p>
                <label for="horário_destino"> Local(Origem):</label> 
                <input id="horário_destino" type="text">
            </p>
              <h3>Informações de Valores</h3>    
                <p>
                <label for="quantidade_número_diárias"> Quantidade de Diárias:</label>
                <input id="quantidade_número_diárias" type="text">    
            </p>     
                <label for="valor_diárias"> Valor/Diária:</label>
                <input id="valor_diárias" type="text">    
            </p>   
             <p>
                <label for="ajuda_de_transporte"> Ajuda de Transporte:</label>
                <input id="ajuda_transporte" type="text">    
            </p>  
            <p>
                <label for="valor_total_a_receber"> Total a Receber:</label>
                <input id="valor_total_a_receber" type="text">
            </p>
        </form>
    </body>
</html>
