<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Aprova Diária</title>
</head>

<body>
    <h1>Requisição de Diária</h1>
    <form>
        <fieldset>
            <legend>Dados do Solicitante</legend>
            <p>
                <label for="nome">Nome:</label>
                <input id="nome" name="nome" type="text" required>
            </p>
            <p>
                <label for="cadastro_cpf">CPF:</label>
                <input id="cadastro_cpf" name="cpf" type="text" inputmode="numeric" placeholder="000.000.000-00"
                    maxlength="14">
            </p>
            <p>
                <label for="numero_funcional">Número Funcional:</label>
                <input id="numero_funcional" name="numero_funcional" type="text">
            </p>
            <p>
                <label for="setor">Setor:</label>
                <input id="setor" name="setor" type="text">
            </p>
            <p>
                <label for="orgao">Órgão:</label>
                <input id="orgao" name="orgao" type="text">
            </p>
        </fieldset>

        <fieldset>
            <legend>Dados Bancários</legend>
            <p>
                <label for="banco">Banco:</label>
                <input id="banco" name="banco" type="text">
            </p>
            <p>
                <label for="tipo_de_conta">Tipo de Conta:</label>
                <select id="tipo_de_conta" name="tipo_de_conta">
                    <option value="corrente">Corrente</option>
                    <option value="poupanca">Poupança</option>
                </select>
            </p>
            <p>
                <label for="cadastro_agencia">Número da Agência:</label>
                <input id="cadastro_agencia" name="agencia" type="text" inputmode="numeric" placeholder="0000-0">
            </p>
            <p>
                <label for="cadastro_numero_daconta">Número da Conta:</label>
                <input id="cadastro_numero_daconta" name="numero_conta" type="text" inputmode="numeric"
                    placeholder="00000-0">
            </p>
        </fieldset>

        <fieldset>
            <legend>Informações da Viagem</legend>
            <p>
                <label for="motivo_da_viagem">Motivo da Viagem:</label>
                <input id="motivo_da_viagem" name="motivo" type="text">
            </p>
            <p>
                <label for="data_partida">Data de Partida:</label>
                <input id="data_partida" name="data_partida" type="date">
            </p>
            <p>
                <label for="data_chegada">Data de Chegada:</label>
                <input id="data_chegada" name="data_chegada" type="date">
            </p>
            <p>
                <label for="hora_partida">Hora de Partida:</label>
                <input id="hora_partida" name="hora_partida" type="time">
            </p>
            <p>
                <label for="hora_chegada">Hora de Chegada:</label>
                <input id="hora_chegada" name="hora_chegada" type="time">
            </p>
            <p>
                <label for="origem">Origem (Cidade/UF):</label>
                <input id="origem" name="origem" type="text">
            </p>
            <p>
                <label for="destino">Destino (Cidade/UF):</label>
                <input id="destino" name="destino" type="text">
            </p>
            <p>
                <label for="transporte">Transporte:</label>
                <select id="transporte" name="transporte">
                    <option value="veiculo_do_orgao">Veículo do Órgão</option>
                    <option value="onibus">Ônibus</option>
                    <option value="aereo">Áereo</option>
                    <option value="outros">Outros</option>
                </select>
        </fieldset>

        <fieldset>
            <legend>Financeiro e Justificativa</legend>
            <p>
                <label for="qtd_diarias">Quantidade de Diárias:</label>
                <input id="qtd_diarias" name="qtd_diarias" type="number" step="0.5">
            <p>
                <label for="valor">Valor:</label>
                <input id="valor" name="valor" type="number" step="0.5">
            <p>
                <label for="ajuda_transporte">Ajuda Transporte:</label>
                <input id="ajuda_transporte" name="ajuda_transporte" type="number" step="0.5">
            <p>
                <label for="total_a_receber">Total a Receber:</label>
                <input id="total_a_receber" name="total_a_receber" type="number" step="0.5">
            </p>
            </p>
            <p>
                <label for="justificativa">Justificativa:</label><br>
                <textarea id="justificativa" name="justificativa" rows="4" cols="50"></textarea>
            </p>
        </fieldset>

        <p>
            <button type="submit">Enviar Requisição</button>
        </p>
    </form>
</body>

</html>
